# Wave 1 — runs AFTER immich-secrets (wave -1) and immich-postgres (wave 0).
# Order matters on a from-scratch deploy: Immich pods reference the k8s Secret
# created by ESO and connect to Postgres immediately at startup. If this synced
# first, pods would crash-loop on either "secret not found" or "connection
# refused" until the dependencies caught up. Wave ordering removes the race.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://immich-app.github.io/immich-charts
    chart: immich
    targetRevision: 0.12.0            # pinned to what `helm search repo immich/immich` printed
    helm:
      releaseName: immich             # makes the chart's `{{ .Release.Name }}-valkey` resolve to `immich-valkey`
      values: |
        # ============================================================
        # IMMICH SERVER — API + web UI. LAN-only Ingress, kube001 pin.
        # All env + envFrom live INSIDE the container spec because
        # bjw-s/common charts scope env at the container level; a
        # values-file-root `env:` is silently dropped. Diagnostic:
        #   kubectl get pod <server-pod> -n immich \
        #     -o jsonpath='{.spec.containers[*].env[*]}'
        # If what you set isn't there, the scope is wrong.
        # ============================================================
        server:
          enabled: true
          controllers:
            main:
              containers:
                main:
                  image:
                    repository: ghcr.io/immich-app/immich-server
                    pullPolicy: IfNotPresent
                  env:
                    # Chart defaults, kept — template-resolve to
                    # `immich-valkey` and `http://immich-machine-learning:3003`
                    REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
                    IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
                    # Postgres connection — non-secret values, plain env vars.
                    # Hostname is the headless Service in manifests/immich-postgres/.
                    DB_HOSTNAME: immich-postgres.immich.svc.cluster.local
                    DB_USERNAME: immich
                    DB_DATABASE_NAME: immich
                  envFrom:
                    # Pulls DB_PASSWORD, JWT_SECRET (and the harmless `password`
                    # key used by Postgres itself) from the ESO-materialized
                    # Secret. Container-level scope — the chart doesn't propagate
                    # release-level envFrom.
                    - secretRef:
                        name: immich-db-credentials
              pod:
                nodeSelector:
                  kubernetes.io/hostname: kube001
          ingress:
            main:
              enabled: true
              className: traefik
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-cloudflare
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                # Deliberately NO crowdsec-bouncer middleware — LAN-only.
                # Flip to public + CrowdSec after NAS + 2FA enrolled.
              hosts:
                - host: immich.jmarcelocarvalho.com
                  paths:
                    - path: /
                      service:
                        identifier: main
              tls:
                - hosts: [ immich.jmarcelocarvalho.com ]
                  secretName: immich-tls

        # ============================================================
        # MACHINE LEARNING — the RAM hog. kube001 pin (16Gi node).
        # Cache flipped from emptyDir → PVC so models survive pod restart.
        # No DB connection here — ML only talks to the server.
        # ============================================================
        machine-learning:
          enabled: true
          controllers:
            main:
              containers:
                main:
                  image:
                    repository: ghcr.io/immich-app/immich-machine-learning
                    pullPolicy: IfNotPresent
                  env:
                    TRANSFORMERS_CACHE: /cache
                    HF_XET_CACHE: /cache/huggingface-xet
                    MPLCONFIGDIR: /cache/matplotlib-config
              pod:
                nodeSelector:
                  kubernetes.io/hostname: kube001
          persistence:
            cache:
              enabled: true
              size: 10Gi
              type: persistentVolumeClaim   # NOT emptyDir — survives pod restarts, no re-download
              accessMode: ReadWriteOnce
              storageClass: local-path

        # ============================================================
        # VALKEY — chart-managed cache. Explicit design choice, not laziness:
        # stock in-memory cache, no persisted state, no vector-extension
        # divergence. Postgres is hand-rolled (real technical justification);
        # Valkey rides the chart (no equivalent justification).
        # ============================================================
        valkey:
          enabled: true
          controllers:
            main:
              pod:
                nodeSelector:
                  kubernetes.io/hostname: kube001

        # ============================================================
        # IMMICH APP-LEVEL persistence and config.
        # ============================================================
        immich:
          persistence:
            library:
              # PVC created out-of-band in manifests/immich/20-library-pvc.yaml
              # so backend swaps (local-path → NFS) don't touch chart values.
              existingClaim: immich-library

  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true    # bjw-s/common charts render large manifests;
                                # client-side apply can trip the 256KB annotation limit
