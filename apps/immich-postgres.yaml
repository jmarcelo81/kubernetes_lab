# Wave 0 (default). The `immich-secrets` app (wave -1) creates the namespace
# and materializes the k8s Secret the StatefulSet references. Wave ordering
# guarantees the Secret exists before the pod tries to consume it — if
# Postgres synced first, it would fail with "secret not found".
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-postgres
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jmarcelo81/kubernetes_lab.git
    targetRevision: main
    path: manifests/immich-postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
