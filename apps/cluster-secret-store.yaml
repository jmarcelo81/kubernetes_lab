# Wave -1: runs AFTER the ESO operator + CRDs (wave -2) exist, BEFORE any eExternalSecret consumer.
# Source is your git repo (not a Helm chart) — it points at the plain manifest already hand-applied,
# which is exactly what hands the ClusterSecretStore over to Argo instead of leaving it as drift.
# The wave ordering isn't cosmetic: the CSS is a custom resource OF the ESO CRDs, so if it syncs 
# before wave -2 lands you get "no matches for kind ClusterSecretStore." -2 then -1 is what prevents that race.


apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secret-store
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jmarcelo81/kubernetes_lab.git
    targetRevision: main
    path: manifests/cluster-secret-store
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets   # ignored for the cluster-scoped CSS, but Argo requires a value
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
