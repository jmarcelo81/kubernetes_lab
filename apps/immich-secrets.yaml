apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"    # secrets before Postgres before Immich
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jmarcelo81/kubernetes_lab.git
    targetRevision: main
    path: manifests/immich
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
