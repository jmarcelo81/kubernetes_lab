---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.19.1
    helm:
      releaseName: harbor
      values: |
        expose:
          type: ingress
          tls:
            enabled: true
            certSource: secret
            secret:
              secretName: harbor-tls
          ingress:
            hosts:
              core: harbor.jmarcelocarvalho.com
            className: traefik
            annotations:
              cert-manager.io/cluster-issuer: selfsigned
              traefik.ingress.kubernetes.io/router.entrypoints: websecure

        externalURL: https://harbor.jmarcelocarvalho.com

        # Admin password from ESO-managed Secret
        existingSecretAdminPassword: harbor-credentials
        existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

        persistence:
          enabled: true
          persistentVolumeClaim:
            registry:
              storageClass: local-path
              size: 60Gi
            jobservice:
              jobLog:
                storageClass: local-path
                size: 1Gi
            database:
              storageClass: local-path
              size: 10Gi
            redis:
              storageClass: local-path
              size: 5Gi
            trivy:
              storageClass: local-path
              size: 5Gi

        database:
          type: internal
          internal:
            password: "HarborInternalPG_ChangeMe_Strong123"

        redis:
          type: internal

        trivy:
          enabled: true

        notary:
          enabled: false

        metrics:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: harbor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
