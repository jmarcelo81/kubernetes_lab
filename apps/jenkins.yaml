apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.jenkins.io
    chart: jenkins
    targetRevision: 4.9.0
    helm:
      values: |
        controller:
          image: jenkins/jenkins
          tag: "2.504.1-jdk21"
          
          persistence:
            enabled: true
            storageClassName: local-path
            size: 20Gi
          
          serviceAccount:
            create: true
            name: jenkins
          
          nodeSelector:
            kubernetes.io/hostname: kube003
          
          installPlugins:
            - kubernetes:latest
            - docker-plugin:latest
            - github-branch-source:latest
            - pipeline-stage-view:latest
            - configuration-as-code:latest
          
          JCasC:
            enabled: true
            configScripts:
              github: |
                credentials:
                  system:
                    domainCredentials:
                      - credentials:
                          - github:
                              scope: GLOBAL
                              id: github-jenkins
                              description: "GitHub token for Jenkins"

        agent:
          enabled: true
          image: jenkins/inbound-agent:latest
        
        rbac:
          create: true
  
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  
  revisionHistoryLimit: 3
