apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipeline-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jmarcelo81/kubernetes_lab.git
    targetRevision: main
    path: manifests/pipeline-test
  destination:
    server: https://kubernetes.default.svc
    namespace: pipeline-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
