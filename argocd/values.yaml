global:
  # pin every ArgoCD component to kubecp, alongside the observability plane
  nodeSelector:
    kubernetes.io/hostname: kubecp

configs:
  params:
    # Traefik terminates TLS at the ingress, so run argocd-server in plain HTTP.
    # Default ArgoCD does its own TLS — behind Traefik that's TLS-on-TLS and the
    # gRPC/CLI path breaks. insecure=true makes the backend HTTP; Traefik owns TLS.
    server.insecure: true
