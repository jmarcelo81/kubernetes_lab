---
apiVersion: v1
kind: Namespace
metadata:
  name: linkding

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: linkding-data
  namespace: linkding
spec:
  accessModes:
    - ReadWriteOnce      # local-path only supports RWO - fine for a single replica
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi        # SQLite db + bookmark archive snapshots; bump later if Wayback snapshotting is enabled

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
  namespace: linkding
  labels:
    app: linkding
spec:
  replicas: 1            # MUST stay 1 - SQLite + local-path volume can't be safely shared across replicas
  strategy:
    type: Recreate        # avoid two pods touching the same RWO volume during a rollout
  selector:
    matchLabels:
      app: linkding
  template:
    metadata:
      labels:
        app: linkding
    spec:
      containers:
        - name: linkding
          image: sissbruecker/linkding:1.45.0-alpine
          ports:
            - containerPort: 9090
          env:
            - name: LD_SUPERUSER_NAME
              value: "marcelo"
            - name: LD_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkding-superuser
                  key: password
            - name: LD_CSRF_TRUSTED_ORIGINS
              value: "https://links.jmarcelocarvalho.com"
          volumeMounts:
            - name: data
              mountPath: /etc/linkding/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: linkding-data

---
apiVersion: v1
kind: Service
metadata:
  name: linkding
  namespace: linkding
spec:
  selector:
    app: linkding
  ports:
    - port: 9090
      targetPort: 9090

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linkding
  namespace: linkding
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - links.jmarcelocarvalho.com
      secretName: links-jmarcelocarvalho-com-tls
  rules:
    - host: links.jmarcelocarvalho.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linkding
                port:
                  number: 9090
