apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-master
  namespace: wazuh
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube001
      containers:
        - name: wazuh-manager
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 4Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-worker
  namespace: wazuh
spec:
  replicas: 1
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube001
      containers:
        - name: wazuh-manager
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
