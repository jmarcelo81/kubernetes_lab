apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: jellyfin
  labels: { app: jellyfin }
spec:
  type: ClusterIP           # LAN/ingress reaches it later; no NodePort/LB for a cluster-internal svc
  selector: { app: jellyfin }
  ports:
    - { name: http, port: 8096, targetPort: 8096 }
