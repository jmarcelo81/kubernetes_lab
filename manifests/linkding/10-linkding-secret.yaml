apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linkding-superuser
  namespace: linkding
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: linkding-superuser
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/linkding
        property: password
