apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels: { app: homepage }
spec:
  replicas: 1
  selector:
    matchLabels: { app: homepage }
  template:
    metadata:
      labels: { app: homepage }
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.13.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "$(MY_POD_IP):3000,homepage.jmarcelocarvalho.com"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - { name: config, mountPath: /app/config/settings.yaml,   subPath: settings.yaml }
            - { name: config, mountPath: /app/config/services.yaml,   subPath: services.yaml }
            - { name: config, mountPath: /app/config/widgets.yaml,    subPath: widgets.yaml }
            - { name: config, mountPath: /app/config/kubernetes.yaml, subPath: kubernetes.yaml }
            - { name: config, mountPath: /app/config/bookmarks.yaml,  subPath: bookmarks.yaml }
            - { name: logs,   mountPath: /app/config/logs }
      volumes:
        - name: config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
