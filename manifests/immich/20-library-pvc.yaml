# Named `20-` to place it AFTER the ExternalSecret (10-) and namespace (00-)
# in the manifests/immich/ Application, which lands under wave -1.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: immich
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
