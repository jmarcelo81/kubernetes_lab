apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-credentials
  namespace: immich
spec:
  # Refresh cadence. Not urgent for a static password, but if rotated in Vault, the
  # materialized k8s Secret catches up within this window without a manual poke.
  refreshInterval: 1h

  # Which store to read from. cluster-scoped -> ClusterSecretStore, cluster-wide reach.
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  # What ESO creates in-cluster. This is the k8s Secret name that immich-server and
  # the bundled Postgres subchart will both reference via existingSecret / secretKeyRef.
  target:
    name: immich-db-credentials
    creationPolicy: Owner       # ESO fully owns this Secret's lifecycle. Delete the
                                # ExternalSecret and the Secret goes with it — clean.

  # The mapping: for each key we want in the k8s Secret, name the Vault path + key.
  # Two keys, same value: Immich's env var is DB_PASSWORD, the Postgres subchart's
  # existingSecret expects the key `password`. One Vault source, two consumers,
  # no drift possible — because they're the same underlying value.
  data:
    - secretKey: password           # what the Postgres subchart reads
      remoteRef:
        key: immich/database        # Vault path (KV v2 UX form — the "secret/" mount is implicit via the store)
        property: password
    - secretKey: DB_PASSWORD        # what immich-server env expects
      remoteRef:
        key: immich/database
        property: password
