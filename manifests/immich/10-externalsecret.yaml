apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-credentials
  namespace: immich
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: immich-db-credentials
    creationPolicy: Owner
  data:
    # DB password, two names (Postgres subchart wants 'password', Immich env wants 'DB_PASSWORD')
    - secretKey: password
      remoteRef:
        key: immich/database
        property: password
    - secretKey: DB_PASSWORD
      remoteRef:
        key: immich/database
        property: password
    # JWT signing key — pulled from a separate Vault path, materialized as a distinct key
    # in the SAME k8s Secret. One Secret consumed by immich-server; both credentials
    # sourced from Vault; no chart-managed secrets anywhere in the flow.
    - secretKey: JWT_SECRET
      remoteRef:
        key: immich/jwt
        property: secret
