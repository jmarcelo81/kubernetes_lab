apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jenkins
  namespace: jenkins
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jenkins.jmarcelocarvalho.com`)
      kind: Rule
      services:
        - name: jenkins
          port: 8080
  tls:
    secretName: jenkins-tls
