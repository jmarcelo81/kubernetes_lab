apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: git-image-updater
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: git-image-updater
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/argocd/image-updater
        property: git-token
    - secretKey: password
      remoteRef:
        key: secret/argocd/image-updater
        property: git-token
