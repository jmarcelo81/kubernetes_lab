apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-image-updater
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-image-updater
    creationPolicy: Owner
  data:
    - secretKey: credentials
      remoteRef:
        key: secret/argocd/image-updater
        property: harbor-credentials
