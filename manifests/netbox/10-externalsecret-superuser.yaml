---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-superuser
  namespace: netbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: netbox-superuser
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: "admin"
        email: "admin@jmarcelocarvalho.com"
        password: "{{ .password }}"
        api_token: "{{ .apiToken }}"
  data:
    - secretKey: password
      remoteRef:
        key: secret/netbox/superuser
        property: password
    - secretKey: apiToken
      remoteRef:
        key: secret/netbox/superuser
        property: api_token
