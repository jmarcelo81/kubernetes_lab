---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-config
  namespace: netbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: netbox-config
    template:
      engineVersion: v2
      data:
        secret_key: "{{ .secretKey }}"
        db_password: "{{ .dbPassword }}"
        tasks_password: "{{ .tasksPassword }}"
        cache_password: "{{ .cachePassword }}"
  data:
    - secretKey: secretKey
      remoteRef:
        key: secret/netbox/app
        property: secret_key
    - secretKey: dbPassword
      remoteRef:
        key: secret/netbox/app
        property: db_password
    - secretKey: tasksPassword
      remoteRef:
        key: secret/netbox/app
        property: tasks_password
    - secretKey: cachePassword
      remoteRef:
        key: secret/netbox/app
        property: cache_password
